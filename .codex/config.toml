# Project-scoped Codex defaults for ARDORS

model = "gpt-5.4"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[sandbox_workspace_write]
network_access = true

# Instruction discovery controls
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CLAUDE.md", ".agents.md"]
project_root_markers = [".git", ".codex"]

[features]
codex_hooks = true

[agents]
max_threads = 6
max_depth = 1

[profiles.fast]
model = "gpt-5.3-codex"
model_reasoning_effort = "low"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.review]
model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "read-only"

[profiles.explore]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "read-only"

[projects."/home/yukawasaki/develop/Ardors-website"]
trust_level = "trusted"

# Optional MCP examples
